name: noon
description: "دليل نون - منصة الإعلانات والخدمات"
publish_to: "none"

version: 1.0.0+1

environment:
  sdk: ">=3.10.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  cupertino_icons: ^1.0.8
  get: ^4.7.3
  hive_flutter: ^1.1.0
  dio: ^5.9.0
  carousel_slider: ^5.1.1
  cached_network_image: ^3.4.1
  intl: ^0.20.2
  flutter_easyloading: ^3.0.5
  url_launcher: ^6.3.2
  s_extensions: ^1.12.1
  flutter_svg: ^2.2.3
  iconsax: ^0.0.8

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter_icons:
  android: true
  ios: true
  image_path: "assets/logo/noon-logo.png"

flutter:
  uses-material-design: true
  assets:
    - assets/icons/
    - assets/logo/
    - assets/images/

  fonts:
    - family: MyFlutterApp
      fonts:
        - asset: fonts/MyFlutterApp.ttf
    - family: IBMPlexSansArabic
      fonts:
        - asset: fonts/IBMPlexSansArabic-Regular.ttf
          weight: 400
        - asset: fonts/IBMPlexSansArabic-Medium.ttf
          weight: 500
        - asset: fonts/IBMPlexSansArabic-SemiBold.ttf
          weight: 600
        - asset: fonts/IBMPlexSansArabic-Bold.ttf
          weight: 700
