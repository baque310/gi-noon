name: noon
description: "A new Flutter project."
publish_to: "none"

version: 1.0.3+4

environment:
  sdk: ">=3.10.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  cupertino_icons: ^1.0.8
  get: ^4.7.3
  hive_flutter: ^1.1.0
  flutter_svg: ^2.2.3
  dio: ^5.9.0
  carousel_slider: ^5.1.1
  cached_network_image: ^3.4.1
  intl: ^0.20.2
  built_value: ^8.12.1
  built_collection: ^5.1.1
  json_annotation: ^4.9.0
  built_value_generator: ^8.12.1
  image_picker: ^1.2.0
  image_cropper: ^11.0.0
  infinite_scroll_pagination: ^4.1.0
  dotted_border: ^3.1.0
  file_picker: ^10.3.8
  path_provider: ^2.1.5
  permission_handler: ^12.0.1
  syncfusion_flutter_pdfviewer: ^32.1.21
  device_info_plus: ^12.3.0
  flutter_launcher_icons: ^0.14.4
  firebase_core: ^4.3.0
  firebase_messaging: ^16.1.0
  firebase_analytics: ^12.1.0
  flutter_local_notifications: ^19.5.0
  flutter_image_gallery_saver: ^1.1.3
  flutter_easyloading: ^3.0.5
  mime: ^2.0.0
  insta_image_viewer: ^1.0.4
  flutter_file_downloader: ^2.1.1
  zoom_tap_animation: ^1.1.0
  socket_io_client: ^3.1.3
  flutter_linkify: ^6.0.0
  url_launcher: ^6.3.2
  in_app_update: ^4.2.5
  dashed_circular_progress_bar: ^0.0.6
  s_extensions: ^1.12.1
  gal: ^2.3.2
  share_plus: ^12.0.1
  http: ^1.6.0
  record: ^6.1.2
  audioplayers: ^6.5.1
  animated_notch_bottom_bar: ^1.0.4
  video_player: ^2.9.2

  iconsax: ^0.0.8
  marquee: ^2.3.0
dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  json_serializable: ^6.11.3
  build_runner: ^2.10.4

flutter_icons:
  android: true
  ios: true
  image_path: "assets/logo/noon-logo.png"

flutter:
  uses-material-design: true
  assets:
    - assets/icons/
    - assets/logo/
    - assets/images/

  fonts:
    - family: MyFlutterApp
      fonts:
        - asset: fonts/MyFlutterApp.ttf
    - family: IBMPlexSansArabic
      fonts:
        - asset: fonts/IBMPlexSansArabic-Regular.ttf
          weight: 400
        - asset: fonts/IBMPlexSansArabic-Medium.ttf
          weight: 500
        - asset: fonts/IBMPlexSansArabic-SemiBold.ttf
          weight: 600
        - asset: fonts/IBMPlexSansArabic-Bold.ttf
          weight: 700
